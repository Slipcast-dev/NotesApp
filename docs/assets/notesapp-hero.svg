<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">NotesApp animated preview</title>
  <desc id="desc">An animated purple workspace with a vault sidebar, note list, Markdown editor and floating accents.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171126"/>
      <stop offset="0.48" stop-color="#2b1748"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#e879f9"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".07"/>
    </linearGradient>
    <radialGradient id="orb">
      <stop offset="0" stop-color="#c084fc" stop-opacity=".78"/>
      <stop offset="1" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#fff" stroke-opacity=".045"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#05030a" flood-opacity=".48"/>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="windowClip">
      <rect x="150" y="70" width="900" height="300" rx="22"/>
    </clipPath>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#background)"/>
  <rect width="1200" height="420" rx="30" fill="url(#grid)"/>

  <circle cx="130" cy="76" r="145" fill="url(#orb)" filter="url(#soft)">
    <animate attributeName="cx" values="130;220;130" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1070" cy="344" r="165" fill="url(#orb)" opacity=".72" filter="url(#soft)">
    <animate attributeName="cy" values="344;270;344" dur="12s" repeatCount="indefinite"/>
  </circle>

  <g opacity=".9">
    <circle cx="84" cy="312" r="4" fill="#c4b5fd">
      <animate attributeName="opacity" values=".2;1;.2" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1110" cy="84" r="5" fill="#93c5fd">
      <animate attributeName="r" values="3;6;3" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <path d="M107 112h18M116 103v18" stroke="#f0abfc" stroke-width="3" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 116 112" to="360 116 112" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>

  <g filter="url(#shadow)">
    <rect x="150" y="70" width="900" height="300" rx="22" fill="#181522" stroke="#fff" stroke-opacity=".2"/>
    <g clip-path="url(#windowClip)">
      <rect x="150" y="70" width="900" height="42" fill="#24202f"/>
      <circle cx="177" cy="91" r="6" fill="#ff6b6b"/>
      <circle cx="197" cy="91" r="6" fill="#ffd166"/>
      <circle cx="217" cy="91" r="6" fill="#66d48a"/>
      <text x="600" y="97" fill="#ddd6fe" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" text-anchor="middle">NotesApp — My Vault</text>

      <rect x="150" y="112" width="210" height="258" fill="#211b2d"/>
      <rect x="360" y="112" width="250" height="258" fill="#1b1724"/>
      <rect x="610" y="112" width="440" height="258" fill="#15131c"/>
      <path d="M360 112v258M610 112v258" stroke="#fff" stroke-opacity=".09"/>

      <text x="178" y="145" fill="#a78bfa" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700">VAULT</text>
      <g fill="#c4b5fd" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14">
        <text x="180" y="180">▾  Notes</text>
        <text x="198" y="211">◇  Ideas</text>
        <text x="198" y="242">◇  Projects</text>
        <text x="198" y="273">◇  Journal</text>
      </g>
      <rect x="169" y="223" width="171" height="34" rx="9" fill="#7c3aed" opacity=".36">
        <animate attributeName="opacity" values=".24;.5;.24" dur="3.2s" repeatCount="indefinite"/>
      </rect>

      <text x="384" y="145" fill="#a78bfa" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700">RECENT</text>
      <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
        <rect x="378" y="161" width="214" height="62" rx="11" fill="url(#panel)"/>
        <text x="394" y="185" fill="#f5f3ff" font-size="14" font-weight="650">Launch ideas</text>
        <text x="394" y="207" fill="#a8a2b3" font-size="12">Today · #product</text>
        <rect x="378" y="231" width="214" height="62" rx="11" fill="#fff" opacity=".045"/>
        <text x="394" y="255" fill="#ddd6fe" font-size="14">Design notes</text>
        <text x="394" y="277" fill="#888292" font-size="12">Yesterday · #ui</text>
        <rect x="378" y="301" width="214" height="50" rx="11" fill="#fff" opacity=".035"/>
        <text x="394" y="331" fill="#bbb4c6" font-size="14">Reading list</text>
      </g>

      <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
        <text x="642" y="159" fill="#fafafa" font-size="25" font-weight="720">Launch ideas</text>
        <rect x="642" y="175" width="326" height="3" rx="2" fill="url(#glow)">
          <animate attributeName="width" values="95;326;95" dur="4.8s" repeatCount="indefinite"/>
        </rect>
        <text x="642" y="211" fill="#c9c3d2" font-size="14">A calm place for ideas, tasks and plans.</text>
        <text x="642" y="247" fill="#a78bfa" font-size="14" font-weight="700">Today</text>
        <rect x="643" y="266" width="15" height="15" rx="4" fill="#7c3aed" stroke="#c4b5fd"/>
        <path d="m647 273 4 4 8-10" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <animate attributeName="stroke-dasharray" values="0 24;24 0;24 0" keyTimes="0;.45;1" dur="3.6s" repeatCount="indefinite"/>
        </path>
        <text x="670" y="279" fill="#d6d1dc" font-size="14">Prepare the macOS release</text>
        <rect x="643" y="299" width="15" height="15" rx="4" fill="none" stroke="#7d7688"/>
        <text x="670" y="312" fill="#aaa4b2" font-size="14">Write the next great idea</text>
        <rect x="642" y="333" width="280" height="9" rx="4.5" fill="#fff" opacity=".075"/>
        <rect x="642" y="333" width="120" height="9" rx="4.5" fill="url(#glow)" opacity=".7">
          <animate attributeName="width" values="70;210;70" dur="5.4s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>
  </g>

  <g opacity=".72">
    <path d="M44 367c83-36 132-22 193 1" fill="none" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" stroke-dasharray="7 12">
      <animate attributeName="stroke-dashoffset" values="0;-38" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M965 43c62-29 119-22 188 16" fill="none" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" stroke-dasharray="7 12">
      <animate attributeName="stroke-dashoffset" values="0;38" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
