name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NotesApp\NotesApp\NotesApp.csproj -r win-x64

      - name: Build
        run: dotnet build NotesApp\NotesApp\NotesApp.csproj -c Debug -r win-x64 --no-restore
