name: Release v2.0.0

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/releases/v2.0.0.md

permissions:
  contents: write

env:
  NOTESAPP_VERSION: 2.0.0
  NOTESAPP_PACKAGE_VERSION: 2.0.0-beta.1
  RELEASE_TAG: v2.0.0-beta.1

jobs:
  macos:
    name: Package macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Package app
        env:
          NOTESAPP_ARCHITECTURE: ${{ matrix.arch }}
        run: ./script/build_and_run.sh --package

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: NotesApp-macOS-${{ matrix.arch }}
          path: dist/NotesApp-v2.0.0-beta.1-macOS-${{ matrix.arch }}.zip
          if-no-files-found: error

  windows:
    name: Package Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Package portable app
        shell: pwsh
        run: |
          ./Tools/PublishPortable.ps1 -Architecture x64
          Move-Item `
            -LiteralPath dist/portable/NotesApp-win-x64-portable.zip `
            -Destination dist/portable/NotesApp-v2.0.0-beta.1-win-x64-portable.zip

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: NotesApp-Windows-x64
          path: dist/portable/NotesApp-v2.0.0-beta.1-win-x64-portable.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - macos
      - windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "NotesApp 2.0.0 Beta 1 — macOS + Windows" \
              --prerelease \
              --notes-file .github/releases/v2.0.0.md
            gh release upload "$RELEASE_TAG" release-assets/*.zip --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/*.zip \
              --target "$GITHUB_SHA" \
              --title "NotesApp 2.0.0 Beta 1 — macOS + Windows" \
              --prerelease \
              --notes-file .github/releases/v2.0.0.md
          fi
